name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Don't cancel an in-flight release when a tag is re-pushed.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: PostBoy/PostBoy/src-tauri -> target
          save-if: true
          shared-key: release-windows

      - name: Install frontend dependencies
        working-directory: PostBoy/PostBoy
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        with:
          projectPath: PostBoy/PostBoy
          tagName: ${{ github.ref_name }}
          releaseName: 'PostBoy ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            **Note:** This Windows build excludes the on-device chatbot (no llama.cpp / Vulkan).
          releaseDraft: false
          prerelease: false
          # Skip llama-cpp-2 / Vulkan on Windows — see Cargo.toml `chatbot` feature.
          args: -- --no-default-features

