name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: PostBoy/PostBoy/src-tauri -> target
          save-if: true
          shared-key: release-windows

      - name: Install frontend dependencies
        working-directory: PostBoy/PostBoy
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        with:
          projectPath: PostBoy/PostBoy
          tagName: ${{ github.ref_name }}
          releaseName: 'PostBoy ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          # Intel macOS (legacy) — re-enable if you need x86_64 builds
          # - runner: macos-15-intel
          #   target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: PostBoy/PostBoy/src-tauri -> target
          save-if: true
          shared-key: release-${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: PostBoy/PostBoy
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        with:
          projectPath: PostBoy/PostBoy
          tagName: ${{ github.ref_name }}
          releaseName: 'PostBoy ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
