<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading Ripple...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding: 48px 0 24px;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin-bottom: 28px;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 22%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(77, 141, 246, 0.35);
        }

        .logo svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .app-name {
            color: #cdd6f4;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .status-text {
            color: #6c7086;
            font-size: 13px;
            height: 18px;
            margin-bottom: 20px;
            transition: opacity 0.3s ease;
        }

        .progress-container {
            width: 240px;
            height: 4px;
            background: #313244;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: shimmer 1.8s infinite;
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease-out 0.4s both;
        }

        .tip {
            color: #585b70;
            font-size: 11px;
            text-align: center;
            max-width: 340px;
            line-height: 1.5;
            padding: 0 24px;
        }

        .tip strong {
            color: #7f849c;
            font-weight: 600;
        }

        .version-info {
            color: #45475a;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(300%); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo-container">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                    <defs>
                        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#ffffff"/>
                            <stop offset="1" stop-color="#4d8df6"/>
                        </linearGradient>
                    </defs>
                    <rect width="32" height="32" rx="7" fill="#000000"/>
                    <circle cx="16" cy="16" r="3.5" fill="url(#g)"/>
                    <circle cx="16" cy="16" r="8" stroke="url(#g)" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
                    <circle cx="16" cy="16" r="13" stroke="url(#g)" stroke-opacity="0.22" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
        </div>
        <div class="app-name">Ripple</div>
        <div class="status-text" id="status">Initializing</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="tip" id="tip"><strong>TIP:</strong> Press Ctrl+Enter from anywhere to send a request</div>
        <div class="version-info" id="version-info">loading version...</div>
    </div>

    <script>
        const statuses = [
            'Initializing',
            'Loading modules',
            'Setting up workspace',
            'Preparing UI',
            'Almost ready'
        ];

        const tips = [
            'Press Ctrl+Enter from anywhere to send a request',
            'Type PPPP or HHHH to open the keyboard shortcuts panel',
            'Use {{variables}} in URLs, headers, and body for dynamic values',
            'Drag sidebars to resize them to your preference',
            'Ripple saves your request history automatically',
            'Use Ctrl+T to open a new tab, Ctrl+W to close'
        ];

        let msgIdx = 0;
        let progress = 0;

        setInterval(() => {
            if (msgIdx < statuses.length) {
                document.getElementById('status').textContent = statuses[msgIdx++];
            }
        }, 400);

        setInterval(() => {
            if (progress <= 100) {
                progress += Math.random() * 25;
                if (progress > 100) progress = 100;
                document.getElementById('progress').style.width = progress + '%';
            }
        }, 200);

        document.getElementById('tip').innerHTML =
            '<strong>TIP:</strong> ' + tips[Math.floor(Math.random() * tips.length)];

        (async function loadVersion() {
            try {
                if (window.__TAURI_INTERNALS__) {
                    const version = await window.__TAURI_INTERNALS__.invoke('get_version');
                    document.getElementById('version-info').textContent = 'v' + version;
                }
            } catch {
                document.getElementById('version-info').textContent = '';
            }
        })();

        setTimeout(() => {
            document.getElementById('progress').style.width = '100%';
        }, 5000);
    </script>
</body>
</html>
